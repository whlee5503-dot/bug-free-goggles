
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 여행 준비물 체크리스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>여행 준비물 체크리스트 생성기</h1>
            <p>몇 가지 질문에 답하고 나만의 준비물 리스트를 만들어보세요.</p>
        </header>

        <main>
            <div id="options-container" class="options">
                <!-- 여행 종류 선택 버튼이 여기에 동적으로 추가됩니다. -->
            </div>

            <button id="generate-btn">리스트 생성하기</button>

            <section id="checklist-container" class="checklist">
                <!-- 생성된 체크리스트가 여기에 표시됩니다. -->
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Your Project Name. All Rights Reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
