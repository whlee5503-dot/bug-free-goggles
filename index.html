<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6143886076350936"
     crossorigin="anonymous"></script>
</head>
<body class="light-mode">
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="theme-switcher">
            <label for="theme-switch">Theme:</label>
            <select id="theme-switch">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>
        <div id="lotto-sets-container"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>
    <script src="main.js" defer></script>
</body>
</html>
